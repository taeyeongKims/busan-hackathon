paths:
  /user/signin:
    post:
      tags:
        - User
      summary: join
      requestBody:
        x-name: body
        required: true
        content:
          application/json: 
            schema:
              required:
              - login_id
              - pwd
              - nick
              properties:
                login_id:
                  type: string
                pwd:
                  type: string
                nick:
                  type: string
          
      responses:
        '200':
          description: 회원가입
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "SwaggerTest1a"
                  isSuccess:
                    type: string
                    example: "login1"
                  code:
                    type: string
                    example: "sdkoa"
                
        '400':
          description: 잘못된 요청
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 400
                  isSuccess:
                    type: boolean
                    example: false
                  code:
                    type: integer
                    example: COMMON001
                  message:
                    type: string
                    example: 잘못된 요청입니다

        '500':
          description: 서버 에러
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 500
                  isSuccess:
                    type: boolean
                    example: false
                  code:
                    type: integer
                    example: COMMON000
                  message:
                    type: string
                    example: 서버 에러, 관리자에게 문의 바랍니다
